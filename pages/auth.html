<!DOCTYPE html>
<html lang="no">
<head>
  <meta charset="UTF-8" />
  <title>Logg inn</title>

  <script src="../js/auth.js" defer></script>
  <link rel="icon" type="image/png" href="../images/ficon.png" />
  <link rel="stylesheet" href="../Css/auth.css" />
</head>

<body>
  <header class="topbar">
    <div class="brand">👨‍👩‍👦‍👦 <strong>Maung Familie</strong></div>
    <nav class="top-action">
      <a href="../index.html" class="btn small active">
        <!-- (svg omitted for brevity) -->
        Dashboard
      </a>
      <!-- Link to THIS page in the same folder: use the exact file name -->
      <a href="Auth.html" class="btn small">Logg inn</a>
    </nav>
  </header>

  <main class="auth-grid">
    <!-- Logg inn -->
    <div class="card auth-card">
      <h2>Logg inn</h2>

      <label for="loginName">Navn</label>
      <input id="loginName" type="text" placeholder="Skriv inn navn" />

      <label for="loginPass">Passord</label>
      <input id="loginPass" type="password" placeholder="Skriv inn passord" />

      <button class="button" id="loginBtn">Logg inn</button>
      <div id="loginMessage"></div>
    </div>

    <!-- Registrer -->
    <div class="card auth-card">
      <h2>Registrer</h2>

      <label for="regName">Navn</label>
      <input id="regName" type="text" placeholder="Velg brukernavn" />

      <label for="regPass">Passord</label>
      <input id="regPass" type="password" placeholder="Velg passord" />

      <label for="regPass2">Gjenta passord</label>
      <input id="regPass2" type="password" placeholder="Gjenta passord" />

      <button id="regBtn" class="button">Opprett</button>
    </div>
  </main>

  <footer class="footer">
    Opphavsrett © 2025 Maung Familie. Alle rettigheter reservert.
  </footer>
</body>
</html>
